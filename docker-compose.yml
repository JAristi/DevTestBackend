version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: franchise_mysql
    command: --port=3306
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: franchise_db
    ports:
      - "3306:3306"
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
    restart: always
    healthcheck:
      test: [ "CMD", "mysql", "-uroot", "-proot", "-e", "SELECT 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: franchise_redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .
    container_name: franchise_api
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    restart: always