spring:
  datasource:
    url: jdbc:mysql://mysql:3306/franchise_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      initializationFailTimeout: 180000
      connectionTimeout: 180000

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true

  data:
    redis:
      host: redis
      port: 6379